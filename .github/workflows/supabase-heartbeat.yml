name: Supabase Heartbeat

on:
  schedule:
    - cron: '0 3 * * 1,4'   # Every Monday & Thursday at 3:00 AM UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to keep project active..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://lnswbbabxfhdujktoabf.supabase.co/rest/v1/${TABLE_NAME}?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Response code: $response"
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "✅ Heartbeat successful"
          else
            echo "❌ Heartbeat failed with status $response"
            exit 1
          fi
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TABLE_NAME: ${{ vars.SUPABASE_TABLE_NAME || 'students' }}
